name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - run: npx playwright install --with-deps chromium

      - name: Run tests before publishing (builds via npm test)
        run: npm test

      - name: Package extension (builds via npm run pack)
        run: npm run pack

      - name: Attach assets to the release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/*.zip
            textfast.user.js
            textfast.ferdium.js
            text-replacer.js
